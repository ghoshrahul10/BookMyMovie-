<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pmax Movies</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', Arial, Helvetica, sans-serif;
}

/* BODY */

body{
background: radial-gradient(circle at top,#111,#000);
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:rgba(0,0,0,0.9);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.05);
position:sticky;
top:0;
z-index:100;
}

.left h2{
font-family:'Bebas Neue', sans-serif;
color:#ff2b2b;
font-size:34px;
letter-spacing:3px;
text-shadow:0 0 15px rgba(255,0,0,0.8);
}

/* NAV LINKS */

.right{
display:flex;
gap:15px;
}

.right a{
text-decoration:none;
color:white;
font-weight:500;
padding:8px 18px;
border-radius:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.right a:hover{
background:#e50914;
box-shadow:0 0 15px rgba(229,9,20,0.7);
}

/* HERO SECTION */

.hero-section{
height:75vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.95)),
url("https://png.pngtree.com/thumb_back/fh260/background/20230706/pngtree-solitary-cinema-seat-placed-on-a-red-carpet-symbolizing-the-purchase-image_3788652.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* HERO TITLE */

.hero-section h1{
font-family:'Bebas Neue', sans-serif;
font-size:75px;
letter-spacing:4px;
margin-bottom:10px;

text-shadow:
0 0 15px #ff0000,
0 0 35px #ff0000,
0 0 60px rgba(255,0,0,0.6);
}

/* HERO SUBTITLE */

.hero-section h2{
font-weight:300;
font-size:24px;
margin-bottom:35px;
color:#e0e0e0;
letter-spacing:1px;

text-shadow:0 0 10px rgba(255,0,0,0.3);
}

/* HERO BUTTON */

.hero-section button{
padding:14px 45px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff003c,#ff2b2b);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;

box-shadow:
0 0 20px rgba(255,0,60,0.6);
}

.hero-section button:hover{
transform:scale(1.08);

box-shadow:
0 0 30px rgba(255,0,60,0.9),
0 0 60px rgba(255,0,60,0.5);
}

/* SECTION TITLE */

.section-title{
margin-top:60px;
font-family:'Bebas Neue', sans-serif;
font-size:40px;
letter-spacing:3px;
font-weight:500;
color:#ffffff;

text-shadow:
0 0 10px rgba(255,255,255,0.2);
}

/* MOVIE GRID */

.movies{
width:90%;
margin:50px auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:35px;
justify-items:center;
}

/* MOVIE POSTERS */

.movies img{
width:180px;
height:270px;
object-fit:cover;
border-radius:15px;

transition:0.35s;

box-shadow:
0 10px 25px rgba(0,0,0,0.8),
0 0 10px rgba(255,0,0,0.3);
}

/* HOVER EFFECT */

.movies img:hover{
transform:scale(1.12) translateY(-8px);

box-shadow:
0 20px 40px rgba(0,0,0,1),
0 0 25px rgba(255,0,0,0.7);
}

/* RESPONSIVE */

@media(max-width:768px){

.hero-section h1{
font-size:45px;
}

.hero-section h2{
font-size:18px;
}

.movies{
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
}

.movies img{
width:140px;
height:210px;
}

}
</style>
</head>

<body>
<div class="nav">
  <div class="left">
    <h2>Pmax</h2>
  </div>

  <div class="right">
    <a href="{% url 'signup' %}">Signup</a>
    <a href="{% url 'login' %}">Login</a>
  </div>
</div>

<div class="hero-section">
  <h1>Welcome to Pmax</h1>
  <h2>Browse Latest Movies 🎥</h2>
  <button>Browse</button>
</div>

<center>
  <h1 class="section-title">Latest Movies</h1>
</center>

<div class="movies">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRG6E23aaLvMp5LzphgI7R2fqURQRj22T0CIQ&s" alt="Dhurandhar">
  <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/14/Tom_%26_Jerry_%28Official_2021_Film_Poster%29.png/250px-Tom_%26_Jerry_%28Official_2021_Film_Poster%29.png" alt="Tom and Jerry">
  <img src="https://www.adkem.jp/wp/wp-content/uploads/2023/01/2009%E3%82%AA%E3%82%BF%E3%82%B1%E3%83%99%EF%BC%81%E3%82%AB%E3%82%B9%E3%82%AB%E3%83%99%E9%87%8E%E7%94%9F%E7%8E%8B%E5%9B%BD.jpg" alt="Movie 3">
  <img src="https://creativereview.imgix.net/uploads/2023/12/Oppenheimer.jpg" alt="Movie 4">
  <img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400/73a947159978135.63aaa5187b82d.png" alt="Movie 5">
  <img src="https://media-cache.cinematerial.com/p/500x/l94wgadr/f1-the-movie-movie-poster.jpg" alt="Movie 6">
  <img src="https://preview.redd.it/new-poster-from-toxic-movie-v0-rhy9zw9eb46g1.jpeg?auto=webp&s=9fd0575d767b6e63ac6c7e30672fc057165ff23c" alt="Toxic">
  <img src="https://m.media-amazon.com/images/M/MV5BNDU2ZTYxYTMtMjhlZC00ZjEwLThhNDUtMzdlNWM4ZDcyYTM1XkEyXkFqcGc@._V1_.jpg" alt="Kantara">
  <img src="https://m.media-amazon.com/images/M/MV5BOTY0YzY3MTMtOWQ5Yi00ODY2LThhOGMtMzFlMjhlODcxOGU1XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="Movie 9">
  <img src="https://m.media-amazon.com/images/I/81vRg6RVaFL.jpg" alt="Joker">
</div>

</body>
</html>
