<!DOCTYPE html>
<html>
<head>
<title>Booking Confirmed</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#141414;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1f1f1f;
padding:40px 60px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,255,157,0.3);
}

.success{
font-size:40px;
color:#00ff9d;
margin-bottom:20px;
}

.details{
margin-top:20px;
line-height:2;
font-size:18px;
}

.seats{
color:#00ff9d;
font-weight:bold;
}

button{
margin-top:30px;
padding:12px 30px;
border:none;
background:#00ff9d;
color:#141414;
font-weight:bold;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00cc7a;
transform:scale(1.05);
box-shadow:0 0 10px #00ff9d;
}

</style>
</head>

<body>

<div class="container">

<div class="success">
✅ Booking Confirmed
</div>

<div class="details">

<p><b>Movie:</b> {{show.movie.name}}</p>

<p><b>Theatre:</b> {{show.theatre.name}}</p>

<p><b>Show Time:</b> {{show.show_time}}</p>

<p><b>Seats:</b>
<span class="seats">
{{ seats|join:", " }}
</span>
</p>

<p><b>Total Paid:</b> ₹{{total}}</p>

</div>

<form action="/">
<button>Back to Home</button>
</form>

</div>

</body>
</html>
